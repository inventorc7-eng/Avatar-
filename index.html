<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Avatar Aang 3D - اللعبة الأسطورية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
        canvas { display: block; }

        /* واجهة المستخدم - الأيقونات الرئيسية */
        .ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .element-btn {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: 0.3s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .element-btn:hover { transform: scale(1.1); background: rgba(255, 255, 255, 0.2); }
        .element-btn.active { border-color: #fff; box-shadow: 0 0 20px #fff; }

        /* أزرار الحركات الخاصة */
        .skills-container {
            position: absolute;
            right: 20px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transform: translateX(100px);
            transition: 0.5s ease;
        }

        .skills-container.visible { opacity: 1; transform: translateX(0); }

        .skill-btn {
            width: 55px; height: 55px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .skill-btn:active { transform: scale(0.9); }

        /* هالة القوة */
        #status-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 30px;
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="status-indicator">اختر عنصراً للتحكم</div>

    <div class="ui-overlay">
        <div class="element-btn" onclick="selectElement('fire', '🔥', '#ff4d4d')" title="نار">🔥</div>
        <div class="element-btn" onclick="selectElement('water', '💧', '#4facfe')" title="ماء">💧</div>
        <div class="element-btn" onclick="selectElement('earth', '⛰️', '#8B4513')" title="أرض">⛰️</div>
        <div class="element-btn" onclick="selectElement('air', '🌪️', '#f0f0f0')" title="هواء">🌪️</div>
    </div>

    <div id="skills" class="skills-container">
        <button class="skill-btn" onclick="performMove(1)">حركة 1</button>
        <button class="skill-btn" onclick="performMove(2)">حركة 2</button>
        <button class="skill-btn" onclick="performMove(3)">حركة 3</button>
        <button class="skill-btn" onclick="performMove(4)">حركة 4</button>
        <button class="skill-btn" onclick="performMove(5)">حركة 5</button>
    </div>

    <script>
        // --- إعدادات المشهد الـ 3D ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // سماء زرقاء

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // الإضاءة
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(light);

        // الأرضية (عشب خفيف)
        const planeGeo = new THREE.PlaneGeometry(200, 200);
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x567d46 });
        const ground = new THREE.Mesh(planeGeo, planeMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // تجسيد "آنج" بشكل مبدئي (صندوق يمثل الشخصية)
        // ملاحظة: يمكنك استبداله بـ GLTF Model لاحقاً
        const geometry = new THREE.BoxGeometry(1, 2, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0xffcc00 }); // لون ملابس آنج
        const aang = new THREE.Mesh(geometry, material);
        aang.position.y = 1;
        scene.add(aang);

        // هالة القوة (تأثير بصري تحت الشخصية)
        const ringGeo = new THREE.RingGeometry(0.8, 1, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        ring.position.y = 0.01;
        scene.add(ring);

        camera.position.set(0, 5, 10);
        camera.lookAt(aang.position);

        // --- منطق اللعبة ---
        let currentElement = '';

        function selectElement(type, icon, color) {
            currentElement = type;
            document.getElementById('status-indicator').innerText = "تم تفعيل قوة الـ " + type.toUpperCase();
            document.getElementById('status-indicator').style.boxShadow = `0 0 20px ${color}`;
            
            // تغيير لون الهالة حول آنج
            ring.material.color.set(color);
            ring.scale.set(1.5, 1.5, 1.5);

            // إظهار أزرار الحركات
            const skills = document.getElementById('skills');
            skills.classList.add('visible');

            // تحديث نصوص الأزرار بناءً على العنصر
            const moves = {
                'fire': ['كرة نار', 'انفجار', 'جدار لهب', 'ركلة تنين', 'نيران زرقاء'],
                'water': ['سوط مائي', 'جليد حاد', 'دوامة', 'شفاء', 'موجة عاتية'],
                'earth': ['رمي صخور', 'زلزال', 'درع طيني', 'قبضة رملية', 'رفع جبل'],
                'air': ['إعصار', 'كرة هواء', 'قفزة عالية', 'دفاع ريحي', 'صفعة هوائية']
            };
            
            const buttons = document.querySelectorAll('.skill-btn');
            moves[type].forEach((move, index) => {
                buttons[index].innerText = move;
                buttons[index].style.borderColor = color;
            });
        }

        function performMove(id) {
            if (!currentElement) return;
            
            // إضافة حركة أنيميشن بسيطة للشخصية عند الضرب
            aang.scale.y = 1.2;
            setTimeout(() => aang.scale.y = 1, 200);

            console.log(`تفيذ الحركة رقم ${id} لعنصر ${currentElement}`);
            // هنا يمكن إضافة Particle Effects لكل حركة
        }

        // تحريك المشهد
        function animate() {
            requestAnimationFrame(animate);
            ring.rotation.z += 0.02; // دوران الهالة
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
